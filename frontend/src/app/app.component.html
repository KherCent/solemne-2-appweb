<div class="app-layout">
  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-logo">🛠️</span>
      <span class="brand-name">InfraTech S.A.</span>
    </div>
    <!-- Mobile Menu Toggle Button -->
    <button class="menu-toggle" (click)="toggleMenu()" [class.open]="isMenuOpen" aria-label="Menu Principal">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <ul class="nav-links" [class.open]="isMenuOpen">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
          📊 Dashboard
        </a>
      </li>
      <li>
        <a routerLink="/incidents" routerLinkActive="active-link" (click)="closeMenu()">
          📋 Incidentes
        </a>
      </li>
      <li>
        <a routerLink="/technicians" routerLinkActive="active-link" (click)="closeMenu()">
          ⚙️ Técnicos
        </a>
      </li>
      <li class="mobile-only-profile">
        <div class="user-profile">
          <span class="avatar">JH</span>
          <span class="username">Jorge Herrera</span>
        </div>
      </li>
    </ul>
    <div class="user-profile desktop-only-profile">
      <span class="avatar">JH</span>
      <span class="username">Jorge Herrera</span>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p>&copy; 2026 InfraTech S.A. Portal de Gestión de Incidentes Técnicos. Todos los derechos reservados.</p>
  </footer>
</div>
